<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>LNDRY_NET // Laundry Tracker</title>
<meta name="theme-color" content="#060a12" />
<link rel="manifest" href="./manifest.json" />
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%23060a12'/%3E%3Ccircle cx='50' cy='50' r='30' fill='none' stroke='%2300e5ff' stroke-width='8'/%3E%3C/svg%3E" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
<style>
  * { box-sizing: border-box; }

  :root {
    --bg: #060a12;
    --panel: #0b1220;
    --panel-alt: #0f1a2e;
    --line: #1b2740;
    --cyan: #00e5ff;
    --pink: #ff2f92;
    --green: #34ffa0;
    --amber: #ffb020;
    --red: #ff4d4d;
    --text: #d9e6f5;
    --text-dim: #5f7390;
  }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    min-height: 100vh;
  }

  .scanlines {
    position: fixed;
    inset: 0;
    pointer-events: none;
    background: repeating-linear-gradient(
      to bottom,
      rgba(255,255,255,0.02) 0px,
      rgba(255,255,255,0.02) 1px,
      transparent 1px,
      transparent 3px
    );
    z-index: 999;
    mix-blend-mode: overlay;
  }

  .topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 18px 20px;
    border-bottom: 1px solid var(--line);
    background: linear-gradient(180deg, var(--panel), transparent);
  }

  .brand { display: flex; align-items: center; gap: 12px; }
  .brand-mark { font-size: 28px; color: var(--cyan); text-shadow: 0 0 12px var(--cyan); }
  .brand-text h1 {
    font-family: 'Orbitron', sans-serif;
    font-size: 20px;
    margin: 0;
    letter-spacing: 2px;
    color: var(--text);
  }
  .brand-text h1 span { color: var(--cyan); text-shadow: 0 0 8px var(--cyan); }
  .tagline { margin: 2px 0 0; font-size: 11px; color: var(--text-dim); }

  .icon-btn {
    background: var(--panel-alt);
    border: 1px solid var(--line);
    color: var(--cyan);
    width: 40px; height: 40px;
    border-radius: 8px;
    font-size: 18px;
    cursor: pointer;
  }
  .icon-btn:hover { border-color: var(--cyan); box-shadow: 0 0 10px rgba(0,229,255,0.3); }

  main { max-width: 720px; margin: 0 auto; padding: 24px 16px 80px; }

  .scan-panel { text-align: center; padding: 20px 0 32px; }

  .radar {
    width: 140px; height: 140px;
    margin: 0 auto 20px;
    position: relative;
    border-radius: 50%;
    border: 1px solid var(--line);
    background: radial-gradient(circle, rgba(0,229,255,0.06), transparent 70%);
    overflow: hidden;
  }
  .radar-rings {
    position: absolute; inset: 0;
    background:
      radial-gradient(circle, transparent 30%, var(--line) 30.5%, transparent 31%),
      radial-gradient(circle, transparent 60%, var(--line) 60.5%, transparent 61%);
  }
  .radar-dot {
    position: absolute; top: 50%; left: 50%;
    width: 6px; height: 6px; margin: -3px;
    background: var(--cyan);
    border-radius: 50%;
    box-shadow: 0 0 8px var(--cyan);
  }
  .radar-sweep {
    position: absolute; inset: 0;
    background: conic-gradient(from 0deg, rgba(0,229,255,0.5), transparent 40%);
    opacity: 0;
    border-radius: 50%;
  }
  .radar.scanning .radar-sweep {
    opacity: 1;
    animation: sweep 1.4s linear infinite;
  }
  @keyframes sweep { to { transform: rotate(360deg); } }

  .btn-primary {
    font-family: 'Orbitron', sans-serif;
    background: linear-gradient(135deg, var(--cyan), #0088aa);
    color: #04121a;
    border: none;
    padding: 12px 28px;
    border-radius: 8px;
    font-weight: 700;
    letter-spacing: 1px;
    cursor: pointer;
    box-shadow: 0 0 16px rgba(0,229,255,0.35);
  }
  .btn-primary:hover { box-shadow: 0 0 24px rgba(0,229,255,0.6); }
  .btn-primary:disabled { opacity: 0.5; cursor: default; box-shadow: none; }

  .btn-ghost {
    font-family: 'Share Tech Mono', monospace;
    background: transparent;
    border: 1px solid var(--line);
    color: var(--text-dim);
    padding: 8px 16px;
    border-radius: 8px;
    cursor: pointer;
  }
  .btn-ghost:hover { border-color: var(--cyan); color: var(--cyan); }

  .scan-status { margin-top: 14px; font-size: 12px; color: var(--text-dim); }

  .list-header {
    display: flex; justify-content: space-between; align-items: center;
    margin: 12px 0 16px; gap: 10px; flex-wrap: wrap;
  }
  .list-header h2 {
    font-family: 'Orbitron', sans-serif;
    font-size: 13px; letter-spacing: 2px;
    color: var(--text-dim);
    margin: 0;
  }

  .machine-grid { display: grid; gap: 14px; }

  .card {
    background: var(--panel);
    border: 1px solid var(--line);
    border-left: 3px solid var(--text-dim);
    border-radius: 10px;
    padding: 16px;
    position: relative;
  }
  .card.status-idle { border-left-color: var(--cyan); }
  .card.status-running { border-left-color: var(--pink); animation: pulseBorder 2s ease-in-out infinite; }
  .card.status-offline { border-left-color: var(--text-dim); opacity: 0.55; }

  @keyframes pulseBorder {
    0%, 100% { box-shadow: -3px 0 12px rgba(255,47,146,0.15); }
    50% { box-shadow: -3px 0 20px rgba(255,47,146,0.4); }
  }

  .card-top { display: flex; align-items: center; gap: 8px; }
  .status-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--text-dim); flex-shrink: 0;
  }
  .status-idle .status-dot { background: var(--cyan); box-shadow: 0 0 6px var(--cyan); }
  .status-running .status-dot { background: var(--pink); box-shadow: 0 0 6px var(--pink); }

  .card-name {
    font-family: 'Orbitron', sans-serif;
    font-size: 14px;
    margin: 0;
    flex: 1;
    color: var(--text);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .rename-btn {
    background: none; border: none; color: var(--text-dim);
    cursor: pointer; font-size: 14px; flex-shrink: 0;
  }
  .rename-btn:hover { color: var(--cyan); }

  .card-coords { font-size: 11px; color: var(--text-dim); margin: 6px 0 10px; }

  .card-status-row { display: flex; justify-content: space-between; font-size: 12px; }
  .status-label { color: var(--text); text-transform: uppercase; letter-spacing: 1px; }
  .card-current { color: var(--cyan); }

  .progress-wrap { margin-top: 12px; }
  .progress-bar {
    height: 8px; border-radius: 4px;
    background: var(--panel-alt);
    border: 1px solid var(--line);
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--pink), var(--cyan));
    box-shadow: 0 0 8px var(--pink);
    transition: width 1s linear;
  }
  .progress-text { display: block; margin-top: 6px; font-size: 11px; color: var(--text-dim); }

  .empty-state { color: var(--text-dim); font-size: 13px; text-align: center; padding: 30px 0; }

  .modal {
    position: fixed; inset: 0;
    background: rgba(2,5,10,0.75);
    display: flex; align-items: center; justify-content: center;
    z-index: 1000;
    padding: 20px;
  }
  .modal.hidden { display: none; }
  .modal-box {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 20px;
    width: 100%; max-width: 380px;
    box-shadow: 0 0 30px rgba(0,229,255,0.1);
  }
  .modal-box h3 {
    font-family: 'Orbitron', sans-serif;
    font-size: 14px; letter-spacing: 2px;
    margin: 0 0 14px;
    color: var(--cyan);
  }
  .modal-hint { font-size: 11px; color: var(--text-dim); margin: -8px 0 14px; }
  .modal-box label { display: block; font-size: 11px; color: var(--text-dim); margin: 12px 0 4px; }
  .modal-box input {
    width: 100%;
    background: var(--panel-alt);
    border: 1px solid var(--line);
    color: var(--text);
    padding: 10px;
    border-radius: 6px;
    font-family: 'Share Tech Mono', monospace;
  }
  .modal-box input:focus { outline: none; border-color: var(--cyan); }
  .modal-actions { display: flex; gap: 10px; margin-top: 18px; }

  .register-result { margin-top: 16px; padding-top: 14px; border-top: 1px solid var(--line); }
  .register-result p { font-size: 11px; color: var(--text-dim); }
  .register-result pre {
    background: var(--panel-alt);
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 10px;
    font-size: 11px;
    color: var(--green);
    overflow-x: auto;
    white-space: pre-wrap;
    word-break: break-all;
  }
  .register-result.hidden { display: none; }

  .toast {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: var(--panel-alt);
    border: 1px solid var(--cyan);
    color: var(--text);
    padding: 10px 18px;
    border-radius: 8px;
    font-size: 12px;
    box-shadow: 0 0 16px rgba(0,229,255,0.25);
    z-index: 1100;
    max-width: 90vw;
  }
  .toast.toast-error { border-color: var(--red); box-shadow: 0 0 16px rgba(255,77,77,0.3); }
  .toast.hidden { display: none; }

  @media (prefers-reduced-motion: reduce) {
    .radar-sweep, .card.status-running { animation: none !important; }
  }
</style>
</head>
<body>
<div class="scanlines"></div>

<header class="topbar">
  <div class="brand">
    <span class="brand-mark">◈</span>
    <div class="brand-text">
      <h1>LNDRY<span>_NET</span></h1>
      <p class="tagline">เครือข่ายตรวจจับเครื่องซักผ้า</p>
    </div>
  </div>
  <button id="settingsBtn" class="icon-btn" aria-label="ตั้งค่า">⚙</button>
</header>

<main>
  <section class="scan-panel">
    <div class="radar" id="radar">
      <div class="radar-rings"></div>
      <div class="radar-sweep"></div>
      <div class="radar-dot"></div>
    </div>
    <button id="scanBtn" class="btn-primary">SCAN AREA</button>
    <p id="scanStatus" class="scan-status">ยังไม่ได้สแกน — กดปุ่มเพื่อค้นหาเครื่องซักผ้าใกล้คุณ</p>
  </section>

  <section class="list-header">
    <h2>NEARBY NODES</h2>
    <button id="registerBtn" class="btn-ghost">+ ลงทะเบียนเครื่องใหม่</button>
  </section>

  <section id="machineList" class="machine-grid" aria-live="polite">
    <p class="empty-state">ยังไม่ได้สแกน</p>
  </section>
</main>

<!-- Settings modal -->
<div id="settingsModal" class="modal hidden">
  <div class="modal-box">
    <h3>SERVER CONFIG</h3>
    <label>Server URL</label>
    <input id="serverUrlInput" type="text" placeholder="https://your-server.example.com" />
    <label>รัศมีค้นหา (กม.)</label>
    <input id="radiusInput" type="number" min="0.1" step="0.5" value="5" />
    <div class="modal-actions">
      <button id="settingsSave" class="btn-primary">บันทึก</button>
      <button id="settingsCancel" class="btn-ghost">ปิด</button>
    </div>
  </div>
</div>

<!-- Register modal -->
<div id="registerModal" class="modal hidden">
  <div class="modal-box">
    <h3>REGISTER NEW NODE</h3>
    <p class="modal-hint">ใช้ตำแหน่งปัจจุบันของมือถือเป็นพิกัดเครื่อง</p>
    <label>ชื่อเครื่อง</label>
    <input id="registerName" type="text" placeholder="เช่น เครื่องซักชั้น 2" />
    <label>เวลาต่อรอบโดยประมาณ (นาที)</label>
    <input id="registerCycle" type="number" min="1" value="40" />
    <div class="modal-actions">
      <button id="registerSubmit" class="btn-primary">ลงทะเบียน</button>
      <button id="registerCancel" class="btn-ghost">ปิด</button>
    </div>
    <div id="registerResult" class="register-result hidden">
      <p>ลงทะเบียนสำเร็จ — คัดลอกค่านี้ไปใส่ในโค้ด ESP32</p>
      <pre id="registerResultCode"></pre>
      <button id="copyResultBtn" class="btn-ghost">คัดลอก</button>
    </div>
  </div>
</div>

<div id="toast" class="toast hidden"></div>

<script>
  const state = {
    serverUrl: localStorage.getItem('lndry_server_url') || '',
    radiusKm: parseFloat(localStorage.getItem('lndry_radius_km')) || 5,
    machines: {}, // id -> machine object
    ws: null,
  };

  const els = {
    scanBtn: document.getElementById('scanBtn'),
    scanStatus: document.getElementById('scanStatus'),
    radar: document.getElementById('radar'),
    machineList: document.getElementById('machineList'),
    settingsBtn: document.getElementById('settingsBtn'),
    settingsModal: document.getElementById('settingsModal'),
    serverUrlInput: document.getElementById('serverUrlInput'),
    radiusInput: document.getElementById('radiusInput'),
    settingsSave: document.getElementById('settingsSave'),
    settingsCancel: document.getElementById('settingsCancel'),
    registerBtn: document.getElementById('registerBtn'),
    registerModal: document.getElementById('registerModal'),
    registerName: document.getElementById('registerName'),
    registerCycle: document.getElementById('registerCycle'),
    registerSubmit: document.getElementById('registerSubmit'),
    registerCancel: document.getElementById('registerCancel'),
    registerResult: document.getElementById('registerResult'),
    registerResultCode: document.getElementById('registerResultCode'),
    copyResultBtn: document.getElementById('copyResultBtn'),
    toast: document.getElementById('toast'),
  };

  function showToast(msg, isError) {
    els.toast.textContent = msg;
    els.toast.classList.remove('hidden');
    els.toast.classList.toggle('toast-error', !!isError);
    clearTimeout(showToast._t);
    showToast._t = setTimeout(() => els.toast.classList.add('hidden'), 3500);
  }

  function requireServerUrl() {
    if (!state.serverUrl) {
      showToast('ตั้งค่า Server URL ก่อน (ปุ่มเฟืองมุมขวาบน)', true);
      openSettings();
      return false;
    }
    return true;
  }

  function wsUrlFromHttp(url) {
    return url.replace(/^http/, 'ws').replace(/\/$/, '') + '/ws';
  }

  // ---------- Settings modal ----------
  function openSettings() {
    els.serverUrlInput.value = state.serverUrl;
    els.radiusInput.value = state.radiusKm;
    els.settingsModal.classList.remove('hidden');
  }
  function closeSettings() { els.settingsModal.classList.add('hidden'); }

  els.settingsBtn.addEventListener('click', openSettings);
  els.settingsCancel.addEventListener('click', closeSettings);
  els.settingsSave.addEventListener('click', () => {
    state.serverUrl = els.serverUrlInput.value.trim().replace(/\/$/, '');
    state.radiusKm = parseFloat(els.radiusInput.value) || 5;
    localStorage.setItem('lndry_server_url', state.serverUrl);
    localStorage.setItem('lndry_radius_km', state.radiusKm);
    closeSettings();
    connectWS();
    showToast('บันทึกการตั้งค่าแล้ว');
  });

  // ---------- Register modal ----------
  els.registerBtn.addEventListener('click', () => {
    if (!requireServerUrl()) return;
    els.registerResult.classList.add('hidden');
    els.registerModal.classList.remove('hidden');
  });
  els.registerCancel.addEventListener('click', () => els.registerModal.classList.add('hidden'));

  els.registerSubmit.addEventListener('click', async () => {
    if (!navigator.geolocation) return showToast('อุปกรณ์นี้ไม่รองรับ Geolocation', true);
    els.registerSubmit.disabled = true;
    navigator.geolocation.getCurrentPosition(async (pos) => {
      try {
        const body = {
          name: els.registerName.value.trim() || undefined,
          lat: pos.coords.latitude,
          lon: pos.coords.longitude,
          cycleMinutes: parseInt(els.registerCycle.value, 10) || 40,
        };
        const res = await fetch(state.serverUrl + '/api/machines/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });
        if (!res.ok) throw new Error('register failed');
        const data = await res.json();
        els.registerResultCode.textContent =
          'MACHINE_ID = "' + data.id + '"\nDEVICE_TOKEN = "' + data.token + '"';
        els.registerResult.classList.remove('hidden');
        showToast('ลงทะเบียนสำเร็จ');
        scanNearby();
      } catch (e) {
        showToast('ลงทะเบียนไม่สำเร็จ: ' + e.message, true);
      } finally {
        els.registerSubmit.disabled = false;
      }
    }, (err) => {
      showToast('ขอตำแหน่งไม่สำเร็จ: ' + err.message, true);
      els.registerSubmit.disabled = false;
    });
  });

  els.copyResultBtn.addEventListener('click', () => {
    navigator.clipboard.writeText(els.registerResultCode.textContent);
    showToast('คัดลอกแล้ว');
  });

  // ---------- Scan ----------
  els.scanBtn.addEventListener('click', scanNearby);

  function scanNearby() {
    if (!requireServerUrl()) return;
    if (!navigator.geolocation) return showToast('อุปกรณ์นี้ไม่รองรับ Geolocation', true);

    els.radar.classList.add('scanning');
    els.scanStatus.textContent = 'กำลังค้นหาตำแหน่ง...';

    navigator.geolocation.getCurrentPosition(async (pos) => {
      const latitude = pos.coords.latitude;
      const longitude = pos.coords.longitude;

      try {
        const url = state.serverUrl + '/api/machines/nearby?lat=' + latitude + '&lon=' + longitude + '&radius_km=' + state.radiusKm;
        const res = await fetch(url);
        if (!res.ok) throw new Error('server error');
        const list = await res.json();

        state.machines = {};
        list.forEach((m) => { state.machines[m.id] = m; });
        renderAll();

        els.scanStatus.textContent = 'พบ ' + list.length + ' เครื่อง ในรัศมี ' + state.radiusKm + ' กม.';
        connectWS();
      } catch (e) {
        els.scanStatus.textContent = 'เชื่อมต่อ server ไม่ได้ ลองใหม่อีกครั้ง';
        showToast(e.message, true);
      } finally {
        els.radar.classList.remove('scanning');
      }
    }, (err) => {
      els.radar.classList.remove('scanning');
      els.scanStatus.textContent = 'ขอตำแหน่งไม่สำเร็จ';
      showToast('ขอตำแหน่งไม่สำเร็จ: ' + err.message, true);
    }, { enableHighAccuracy: true, timeout: 10000 });
  }

  // ---------- WebSocket realtime ----------
  function connectWS() {
    if (!state.serverUrl) return;
    if (state.ws) { try { state.ws.close(); } catch (_) {} }
    try {
      state.ws = new WebSocket(wsUrlFromHttp(state.serverUrl));
      state.ws.onmessage = (evt) => {
        try {
          const msg = JSON.parse(evt.data);
          if (msg.type === 'hello') {
            msg.machines.forEach((m) => {
              if (state.machines[m.id]) Object.assign(state.machines[m.id], m);
            });
            renderAll();
          }
          if (msg.type === 'machine_update' && state.machines[msg.machine.id]) {
            Object.assign(state.machines[msg.machine.id], msg.machine);
            renderAll();
          }
        } catch (_) {}
      };
    } catch (_) {}
  }

  // ---------- Rendering ----------
  function statusLabel(status) {
    return { idle: 'ว่าง', running: 'กำลังทำงาน', offline: 'ออฟไลน์' }[status] || status;
  }

  function computeLiveRunning(m) {
    if (m.status !== 'running' || !m.cycleStartedAt) {
      return { remainingMinutes: m.remainingMinutes, progressPercent: m.progressPercent };
    }
    const elapsedMin = (Date.now() - m.cycleStartedAt) / 60000;
    const remainingMinutes = Math.max(0, Math.round(m.cycleMinutes - elapsedMin));
    const progressPercent = Math.min(100, Math.round((elapsedMin / m.cycleMinutes) * 100));
    return { remainingMinutes, progressPercent };
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  function renderAll() {
    const list = Object.values(state.machines).sort((a, b) => (a.distanceKm ?? 0) - (b.distanceKm ?? 0));

    if (list.length === 0) {
      els.machineList.innerHTML = '<p class="empty-state">ยังไม่พบเครื่องซักผ้าในรัศมีนี้ — ลองขยายรัศมีในตั้งค่า หรือลงทะเบียนเครื่องใหม่</p>';
      return;
    }

    els.machineList.innerHTML = list.map((m) => {
      const live = computeLiveRunning(m);
      const isRunning = m.status === 'running';
      const progress = live.progressPercent ?? 0;
      const remain = live.remainingMinutes != null ? live.remainingMinutes : '?';
      return (
        '<article class="card status-' + m.status + '">' +
          '<div class="card-top">' +
            '<span class="status-dot"></span>' +
            '<h3 class="card-name">' + escapeHtml(m.name) + '</h3>' +
            '<button class="rename-btn" data-id="' + m.id + '" aria-label="แก้ชื่อ">✎</button>' +
          '</div>' +
          '<p class="card-coords">' + m.lat.toFixed(5) + ', ' + m.lon.toFixed(5) +
            (m.distanceKm != null ? ' · ' + m.distanceKm + ' กม.' : '') + '</p>' +
          '<div class="card-status-row">' +
            '<span class="status-label">' + statusLabel(m.status) + '</span>' +
            '<span class="card-current">' + (m.currentA != null ? m.currentA.toFixed(2) + ' A' : '—') + '</span>' +
          '</div>' +
          (isRunning ?
            '<div class="progress-wrap">' +
              '<div class="progress-bar"><div class="progress-fill" style="width:' + progress + '%"></div></div>' +
              '<span class="progress-text">เหลืออีกประมาณ ' + remain + ' นาที</span>' +
            '</div>' : ''
          ) +
        '</article>'
      );
    }).join('');

    document.querySelectorAll('.rename-btn').forEach((btn) => {
      btn.addEventListener('click', () => renamePrompt(btn.dataset.id));
    });
  }

  async function renamePrompt(id) {
    const m = state.machines[id];
    const newName = prompt('ตั้งชื่อเครื่องซักผ้า', m ? m.name : '');
    if (!newName || !newName.trim()) return;
    try {
      const res = await fetch(state.serverUrl + '/api/machines/' + id, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name: newName.trim() }),
      });
      if (!res.ok) throw new Error('rename failed');
      const updated = await res.json();
      state.machines[id] = Object.assign({}, state.machines[id], updated);
      renderAll();
    } catch (e) {
      showToast('เปลี่ยนชื่อไม่สำเร็จ', true);
    }
  }

  // ---------- Init ----------
  setInterval(() => {
    if (Object.values(state.machines).some((m) => m.status === 'running')) renderAll();
  }, 1000);

  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js').catch(() => {});
    });
  }

  if (state.serverUrl) {
    connectWS();
  } else {
    openSettings();
  }
</script>
</body>
</html>
